name: Continuous Integration
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - main

jobs:
  build:
    name: Build
    uses: ./.github/workflows/build-reusable.yaml
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ^1.24
      - name: vet
        run: go vet ./...
      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
            version: v2.6
      - name: Create test tmp dir
        run: sudo mkdir /mnt/tmp && sudo chmod 1777 /mnt/tmp
      - name: test
        # 45m timeout: the restart-safety tests in resume_test.go and the
        # EVE-patterned end-to-end tests run real resizes (shrink + copy of
        # multi-GB fixtures), which together exceed the default 10m. Use
        # `-short` to skip them in a fast loop. (The chaos soak test is opt-in
        # via RESIZER_CHAOS and never runs here.)
        run: TMPDIR=/mnt/tmp go test -timeout 45m ./...